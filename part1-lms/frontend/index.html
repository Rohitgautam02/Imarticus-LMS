<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Imarticus LMS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="site-header" id="site-header"></header>

    <div class="main-container">
        <h1 class="page-title">Available Courses</h1>

        <div id="alert-container"></div>

        <div class="course-grid" id="course-grid">
            <!-- courses will be loaded here -->
            <p style="color:#999; grid-column: 1/-1; text-align:center; padding:40px;">Loading courses...</p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // check authentication
        if (!requireAuth()) {
            // requireAuth redirects to login
        } else {
            renderHeader();
            loadCourses();
        }

        async function loadCourses() {
            var grid = document.getElementById('course-grid');

            try {
                var response = await fetchWithAuth('/courses');
                if (!response) return;

                var data = await response.json();
                var courses = data.courses;

                if (!courses || courses.length === 0) {
                    grid.innerHTML = '<p style="color:#999; grid-column:1/-1; text-align:center; padding:40px;">No courses available yet.</p>';
                    return;
                }

                var html = '';
                for (var i = 0; i < courses.length; i++) {
                    var c = courses[i];

                    // get first letters for the thumbnail placeholder
                    var initials = c.title.split(' ').map(function(w) { return w[0]; }).join('').substring(0, 3);

                    html += '<div class="course-card" onclick="window.location.href=\'/course.html?id=' + c._id + '\'">'
                        + '<div class="card-thumb">'
                        + '<div class="thumb-text">' + initials + '</div>'
                        + '</div>'
                        + '<div class="card-body">'
                        + '<span class="card-badge">Free</span>'
                        + '<h3 class="card-title">' + c.title + '</h3>'
                        + '<p class="card-instructor">By ' + c.instructor + '</p>'
                        + '<div class="card-meta">'
                        + '<span class="card-rating">' + c.rating + ' (' + c.totalRatings + ' ratings)</span>'
                        + '<span>' + c.enrollments + ' enrolled</span>'
                        + '</div>'
                        + '</div>'
                        + '</div>';
                }

                grid.innerHTML = html;

            } catch (err) {
                grid.innerHTML = '<p style="color:#d9534f; grid-column:1/-1; text-align:center; padding:40px;">Failed to load courses. Please try again.</p>';
            }
        }
    </script>
</body>
</html>
